<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .icon-wrap { width: 512px; height: 512px; }
</style>
</head>
<body>
<div class="icon-wrap">
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a88ed8"/>
      <stop offset="50%" style="stop-color:#8668c0"/>
      <stop offset="100%" style="stop-color:#6a50a0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.06)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- SID character, scaled and centered -->
  <g transform="translate(56, 40) scale(4.0)">
    <!-- Hair tufts -->
    <path d="M38 14Q36 4 33 6Q34 10 38 15Z" fill="#8a6c4a" opacity="0.9"/>
    <path d="M50 10Q50 0 47 3Q48 8 50 13Z" fill="#8a6c4a" opacity="0.9"/>
    <path d="M62 14Q64 4 67 6Q66 10 62 15Z" fill="#8a6c4a" opacity="0.9"/>

    <!-- Ears -->
    <ellipse cx="16" cy="40" rx="9" ry="11" fill="#d4a96a"/>
    <ellipse cx="16" cy="40" rx="5" ry="7" fill="#e0bb80" opacity="0.5"/>
    <ellipse cx="84" cy="40" rx="9" ry="11" fill="#d4a96a"/>
    <ellipse cx="84" cy="40" rx="5" ry="7" fill="#e0bb80" opacity="0.5"/>

    <!-- Head -->
    <ellipse cx="50" cy="54" rx="38" ry="40" fill="#d4a96a"/>

    <!-- Face lighter area -->
    <ellipse cx="50" cy="59" rx="29" ry="29" fill="#e8c88a"/>

    <!-- Subtle cheek blush -->
    <ellipse cx="30" cy="58" rx="8" ry="5" fill="#e8a88a" opacity="0.2"/>
    <ellipse cx="70" cy="58" rx="8" ry="5" fill="#e8a88a" opacity="0.2"/>

    <!-- Eye whites with subtle shadow -->
    <ellipse cx="38" cy="47" rx="11" ry="12" fill="#f0f0f0"/>
    <ellipse cx="62" cy="47" rx="11" ry="12" fill="#f0f0f0"/>
    <ellipse cx="38" cy="47" rx="10" ry="11" fill="white"/>
    <ellipse cx="62" cy="47" rx="10" ry="11" fill="white"/>

    <!-- Irises -->
    <circle cx="39.5" cy="47" r="6.5" fill="#2d7abf"/>
    <circle cx="63.5" cy="47" r="6.5" fill="#2d7abf"/>
    <!-- Iris gradient -->
    <circle cx="39.5" cy="47" r="6.5" fill="url(#bg)" opacity="0.15"/>
    <circle cx="63.5" cy="47" r="6.5" fill="url(#bg)" opacity="0.15"/>

    <!-- Pupils -->
    <circle cx="40" cy="46" r="3.5" fill="#1a1a2e"/>
    <circle cx="64" cy="46" r="3.5" fill="#1a1a2e"/>

    <!-- Eye highlights -->
    <circle cx="42" cy="44" r="2" fill="white" opacity="0.9"/>
    <circle cx="66" cy="44" r="2" fill="white" opacity="0.9"/>
    <circle cx="38" cy="49" r="1" fill="white" opacity="0.5"/>
    <circle cx="62" cy="49" r="1" fill="white" opacity="0.5"/>

    <!-- Nose -->
    <ellipse cx="50" cy="61" rx="8" ry="6" fill="#8b6baa"/>
    <ellipse cx="50" cy="59.5" rx="6" ry="4" fill="#9b7eba" opacity="0.4"/>
    <!-- Nose highlight -->
    <ellipse cx="48" cy="59" rx="2.5" ry="1.8" fill="white" opacity="0.25"/>

    <!-- Smile -->
    <path d="M43 69Q50 77 57 69" stroke="#7a5c3a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
</div>
</body>
</html>
